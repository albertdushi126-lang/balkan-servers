<html lang="en">

<script>
const CONFIG = {
  apiBase : "https://balkan-backend.onrender.com",
  maxLevel : 30,
  // total EXP needed to REACH each level (index 0 = level 1 ... index 29 = level 30 = MAX)
  expTable : [0,8,16,26,40,80,110,250,350,500,850,1100,1525,1800,2400,3000,3875,4900,7000,9600,12400,15400,18600,22750,27500,34500,40000,50000,75000,100000],
  knifeImg : ["assets/wiki/knife_combat.webp","assets/wiki/knife_strong.webp","assets/wiki/knife_axe.webp","assets/wiki/knife_hammer.png",null,"assets/wiki/knife_master.webp"],
  zclassImg: ["assets/wiki/zclass_fast.png","assets/wiki/zclass_stamper.png","assets/wiki/zclass_healer.png","assets/wiki/zclass_heavy.png","assets/wiki/zclass_hunter.png","assets/wiki/zclass_sirens.png","assets/wiki/zclass_tesla.png","assets/wiki/zclass_deimos.png"],
  zclassPos: ["50%","60%","74%","50%","28%","74%","50%","50%"],
  medals : [
    { i:0, name:"Gun Expert",        desc:"Kill 5000 zombies with any weapon", target:5000, icon:"fa-gun" },
    { i:1, name:"Headshot Expert",   desc:"1000 headshot zombie kills",         target:1000, icon:"fa-crosshairs" },
    { i:2, name:"Knife Expert",      desc:"Knife 1000 zombies",                 target:1000, icon:"fa-khanda" },
    { i:3, name:"Explosives Expert", desc:"1000 grenade / explosion kills",     target:1000, icon:"fa-bomb" },
    { i:4, name:"Survivor Hunter",   desc:"Kill 1000 survivors",                target:1000, icon:"fa-skull" },
    { i:5, name:"Nemesis Hunter",    desc:"Kill 1000 nemesis",                  target:1000, icon:"fa-dragon" },
    { i:6, name:"Mayhem Veteran",    desc:"Win 100 pile-on rounds",             target:100,  icon:"fa-people-group" },
    { i:7, name:"Plague Veteran",    desc:"Win 100 plague rounds",              target:100,  icon:"fa-virus" },
    { i:8, name:"Alien Slayer",      desc:"Kill the Alien boss 10 times",       target:10,   icon:"fa-jedi" }
  ]
};
</script>

<style>
:root{
  --bg:#070809;--bg2:#0c0e12;--panel:#12151b;--panel2:#191d25;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.15);
  --txt:#eef0f3;--dim:#9aa0ac;--mute:#3b3f48;
  --red:#e3342f;--red-d:#b3231f;--gold:#e8b54a;--green:#2fbf71;--blue:#3b82f6;--purple:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;line-height:1.6}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.gold{color:var(--gold)}.accent{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:'Oswald';text-transform:uppercase;letter-spacing:1px;font-size:14px;padding:10px 18px;border-radius:8px;border:1px solid var(--line2);cursor:pointer;transition:.18s;background:var(--panel2);color:var(--txt)}
.btn:hover{transform:translateY(-2px)}
.btn-red{background:var(--red);color:#fff;border:0}.btn-gold{background:var(--gold);color:#241a02;border:0}.btn-green{background:var(--green);color:#06200f;border:0}.btn-ghost{background:transparent}

header{position:sticky;top:0;z-index:100;background:rgba(7,8,9,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
nav{display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Oswald';font-weight:700;font-size:21px;letter-spacing:1px}.logo i{color:var(--red);font-size:24px}
.nav-links{display:flex;align-items:center;gap:22px}.nav-links a{color:var(--dim);font-size:14px;font-weight:500}.nav-links a:hover{color:var(--txt)}
.nav-cta{display:flex;gap:8px;align-items:center}
.phead{padding:34px 0 4px}.phead .k{color:var(--red);font-family:'Oswald';letter-spacing:3px;font-size:13px}.phead h1{font-size:clamp(30px,5vw,52px);margin-top:4px}.phead p{color:var(--dim);margin-top:6px}
section{padding:20px 0}.shead{margin-bottom:14px}.shead .k{color:var(--gold);font-family:'Oswald';letter-spacing:2px;font-size:12px}.shead h2{font-size:clamp(22px,3.5vw,30px)}

/* ===== cabinet ===== */
.cab{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:22px}
.cover{height:180px;background:linear-gradient(120deg,rgba(227,52,47,.22),rgba(232,181,74,.10)),radial-gradient(120% 140% at 70% -20%,rgba(227,52,47,.3),#0a0b0e);background-size:cover;background-position:center;position:relative}
.cover .cv-edit{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);border:1px solid var(--line2);color:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;font-size:12px}
.cover .cv-edit:hover{background:rgba(0,0,0,.75)}
.cab-top{display:flex;gap:18px;align-items:flex-end;padding:0 24px 22px;margin-top:-46px;flex-wrap:wrap;position:relative}
.avatar{position:relative;width:104px;height:104px;flex:0 0 104px}
.avatar img{width:104px;height:104px;border-radius:20px;object-fit:cover;border:3px solid var(--panel)}
.avatar .ph{width:104px;height:104px;border-radius:20px;background:var(--panel2);border:3px solid var(--panel);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--gold)}
.avatar .cam{position:absolute;bottom:-4px;right:-4px;width:32px;height:32px;border-radius:50%;background:var(--gold);color:#241a02;border:3px solid var(--panel);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.cab-id{padding-bottom:4px}.cab-id h2{font-size:26px}
.cab-id .meta{color:var(--dim);font-size:13.5px;margin-top:2px;display:flex;flex-wrap:wrap;gap:4px 16px}.cab-id .meta b{color:var(--txt);font-weight:600}
.cab-act{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;padding-bottom:6px}
.edit{padding:20px 24px;border-top:1px solid var(--line);display:none}.edit.open{display:block}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:12px}.field label{display:block;font-size:12.5px;color:var(--dim);margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);font-size:14px;outline:none}.field input:focus{border-color:var(--gold)}
.emsg{font-size:13px;margin-top:6px;min-height:18px}.emsg.ok{color:var(--green)}.emsg.bad{color:var(--red)}

/* ===== game profile ===== */
.gp{padding:6px 0 0;border-top:1px solid var(--line)}
.gp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 4px;flex-wrap:wrap;gap:10px}
.gp-head .who{display:flex;align-items:center;gap:8px;font-family:'Oswald';letter-spacing:1px;font-size:14px;color:var(--dim)}
.gp-rank{font-family:'Oswald';color:var(--gold);font-size:14px}
.gp-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;padding:8px 24px 20px}
@media(max-width:760px){.gp-grid{grid-template-columns:1fr}.frow{grid-template-columns:1fr}.cab-act{margin-left:0}}
.lvlcard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px}
.lvlcard .top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.lvlbadge{width:62px;height:62px;flex:0 0 62px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#3a2c0e,#171922);border:2px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(232,181,74,.25)}
.lvlbadge .lv{font-family:'Oswald';font-size:22px;color:var(--gold);line-height:1}.lvlbadge .mx{font-size:9px;color:var(--dim);font-family:'Oswald';letter-spacing:1px}
.lvlcard .lt b{font-family:'Oswald';font-size:18px}.lvlcard .lt span{color:var(--dim);font-size:12.5px;display:block}
.xpbar{height:12px;border-radius:7px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#c8902f)}
.xpinfo{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-top:7px;font-family:'Oswald';letter-spacing:.5px}
.xpinfo .max{color:var(--gold)}
.gp-side{display:grid;grid-template-rows:auto auto;gap:14px}
.money{background:linear-gradient(120deg,rgba(232,181,74,.14),var(--bg2));border:1px solid rgba(232,181,74,.3);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.money .mi{font-size:30px;color:var(--gold)}
.money .mv{font-family:'Oswald';font-size:26px}.money .ml{font-size:11px;color:var(--dim);font-family:'Oswald';letter-spacing:1px;text-transform:uppercase}
.gear{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gcard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative;aspect-ratio:3/4;display:flex;flex-direction:column}
.gcard .gpic{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-height:0}
.gcard .gpic img{max-height:100%;max-width:100%;object-fit:contain;filter:drop-shadow(0 6px 12px rgba(0,0,0,.5))}
.gcard .gpic .gph{font-size:46px;color:var(--line2)}
.gcard .gcap{padding:9px 12px;text-align:center;border-top:1px solid var(--line)}
.gcard .gl{font-size:10px;color:var(--dim);font-family:'Oswald';letter-spacing:1px;text-transform:uppercase}
.gcard .gv{font-family:'Oswald';font-size:16px}
/* class: the photo COVERS the entire card, name overlaid */
.gcard.fill .cov{position:absolute;inset:0;background-position:center top;background-size:cover}
.gcard.fill .gph2{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:58px;color:var(--line2)}
.gcard.fill .ov{position:absolute;inset:0;background:linear-gradient(transparent 48%,rgba(0,0,0,.55) 72%,rgba(0,0,0,.92));display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.gcard.fill .ov .gl{color:var(--gold)}.gcard.fill .ov .gv{font-size:19px}
.kb-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line)}
.kb{background:var(--panel);padding:13px 16px;text-align:center}
.kb .l{font-size:10px;color:var(--dim);font-family:'Oswald';letter-spacing:1px;text-transform:uppercase}.kb .v{font-family:'Oswald';font-size:22px;margin-top:2px}

/* ===== achievements (color-fill reveal) ===== */
.medals{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.medal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;display:flex;gap:14px;align-items:flex-start}
.medal.done{border-color:rgba(232,181,74,.55);background:linear-gradient(150deg,rgba(232,181,74,.12),transparent)}
.badge{width:54px;height:54px;flex:0 0 54px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#23252e,#101219);border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;position:relative}
.medal.done .badge{border-color:var(--gold);box-shadow:0 0 14px rgba(232,181,74,.3)}
.badge i{font-size:24px}
.badge.imgb{overflow:hidden;background:#0d0f15}
.badge.imgb .bw{position:absolute;inset:0;background-size:cover;background-position:center top;filter:grayscale(1) brightness(.78)}
.badge.imgb .rev{position:absolute;inset:0;background-size:cover;background-position:center top}
.medal h4{font-size:14px;display:flex;align-items:center;gap:7px}.medal h4 .chk{color:var(--green);font-size:12px}
.medal p{color:var(--dim);font-size:12px}
.mprog{height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;margin-top:7px}.mprog i{display:block;height:100%;background:var(--gold)}
.medal .num{font-size:11px;color:var(--dim);margin-top:4px;font-family:'Oswald'}

/* ===== search / leaderboard ===== */
.search{display:flex;gap:10px;margin:8px 0 4px;flex-wrap:wrap}
.search input{flex:1;min-width:230px;padding:12px 14px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);font-size:15px;outline:none}.search input:focus{border-color:var(--gold)}
.hint{color:var(--dim);font-size:13px}
.lb{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.lb th,.lb td{padding:12px 15px;text-align:left;border-bottom:1px solid var(--line);font-size:14px}
.lb th{font-family:'Oswald';letter-spacing:1px;font-size:12px;color:var(--dim);text-transform:uppercase}
.lb tr:last-child td{border-bottom:0}.lb td.pos{font-family:'Oswald';color:var(--gold);font-size:18px}
.lb td.nick{font-weight:600;cursor:pointer}.lb td.nick:hover{color:var(--gold)}.lb .tag{font-size:11px;background:var(--panel2);border-radius:20px;padding:2px 9px;color:var(--dim);font-family:'Oswald'}
.msg{padding:26px;text-align:center;color:var(--dim)}.msg i{font-size:30px;color:var(--line2);display:block;margin-bottom:8px}
footer{border-top:1px solid var(--line);padding:30px 0;margin-top:24px}.foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;color:var(--dim);font-size:13px}
</style>
</head>

<div class="wrap"><div class="phead"><div class="k">ACCOUNT</div><h1>My <span class="gold">Cabinet</span></h1>

<script>
const fmt = (n) => (n==null ? '—' : Number(n).toLocaleString('en-US'));
const validSteam = (s) => /^STEAM_[0-5]:[01]:\d+$/i.test((s||'').trim());
const esc = (s) => String(s==null?'':s).replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
document.addEventListener('balkan-auth', renderCabinet);
window.onBalkanAuth = renderCabinet;

/* ---- level / exp ---- */
function levelBlock(d){
  const T=CONFIG.expTable, MX=CONFIG.maxLevel;
  const L=Math.max(1,Math.min(d.level||1,MX)), exp=d.exp||0;
  const prev=T[L-1]||0, next=(L<MX)?T[L]:T[MX-1];
  const pct=(L>=MX)?100:Math.min(100,Math.round((exp-prev)/Math.max(1,next-prev)*100));
  const toNext=(L>=MX)?0:Math.max(0,next-exp), toMax=Math.max(0,T[MX-1]-exp);
  return `<div class="lvlcard">
    <div class="top">
      <div class="lvlbadge"><div class="lv">${L}</div><div class="mx">/ ${MX}</div></div>
      <div class="lt"><b>Level ${L} ${L>=MX?'· <span class="gold">MAX</span>':'/ '+MX}</b>
        <span>${L>=MX?'Maxed out — legend status.':fmt(toNext)+' EXP to level '+(L+1)}</span></div>
    </div>
    <div class="xpbar"><i style="width:${pct}%"></i></div>
    <div class="xpinfo"><span>${fmt(exp)} EXP</span><span class="max">${L>=MX?'100% — MAX':fmt(toMax)+' to MAX (lvl '+MX+')'}</span></div>
  </div>`;
}

/* ---- gear card (knife / class with photo) ---- */
function knifeCard(name, img){
  const pic = img ? `<img src="${img}" alt="${esc(name)}">` : `<i class="fa-solid fa-khanda gph"></i>`;
  return `<div class="gcard"><div class="gpic">${pic}</div><div class="gcap"><div class="gl">Knife</div><div class="gv">${esc(name)}</div></div></div>`;
}
function classCard(name, img, pos){
  return `<div class="gcard fill">${ img ? `<div class="cov" style="background-image:url('${img}');background-position:${pos||'50%'} 16%"></div>` : `<div class="gph2"><i class="fa-solid fa-skull"></i></div>` }
    <div class="ov"><div class="gl">Zombie class</div><div class="gv">${esc(name)}</div></div></div>`;
}

/* ---- stats panel (cabinet game-profile + search) ---- */
function gameProfile(d, isMe){
  const medals = CONFIG.medals.map(m=>{
    const val=(d.extra&&d.extra[m.i])||0, done=val>=m.target, pct=Math.min(100,Math.round(val/m.target*100));
    const fill = done ? 'var(--gold)' : `linear-gradient(90deg,var(--gold) ${pct}%,var(--mute) ${pct}%)`;
    const badge = m.img
      ? `<div class="badge imgb"><div class="bw" style="background-image:url('${m.img}')"></div><div class="rev" style="background-image:url('${m.img}');clip-path:inset(0 ${100-pct}% 0 0)"></div></div>`
      : `<div class="badge"><i class="fa-solid ${m.icon}" style="background:${fill};-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent"></i></div>`;
    return `<div class="medal ${done?'done':''}">
      ${badge}
      <div style="flex:1"><h4>${m.name} ${done?'<span class="chk"><i class="fa-solid fa-check"></i></span>':''}</h4><p>${m.desc}</p>
        ${done?'':`<div class="mprog"><i style="width:${pct}%"></i></div><div class="num">${fmt(val)} / ${fmt(m.target)}</div>`}</div></div>`;
  }).join('');
  return `<div class="gp">
    <div class="gp-head"><div class="who"><i class="fa-solid fa-gamepad"></i> GAME PROFILE · ${esc(d.nick)}${isMe?' <span class="gold">· you</span>':''}</div>
      <div class="gp-rank"><i class="fa-solid fa-ranking-star"></i> Rank #${d.rank||'—'} of ${fmt(d.totalPlayers)}</div></div>
    <div class="gp-grid">
      ${levelBlock(d)}
      <div class="gp-side">
        <div class="money"><i class="fa-solid fa-sack-dollar mi"></i><div><div class="ml">Money</div><div class="mv">${fmt(d.money)} <span class="gold">$</span></div></div></div>
        <div class="gear">${knifeCard(d.knife, CONFIG.knifeImg[d.knifeId])}${classCard(d.zclass, CONFIG.zclassImg[d.zclassId], CONFIG.zclassPos[d.zclassId])}</div>
      </div>
    </div>
    <div class="kb-row">
      <div class="kb"><div class="l">Kills</div><div class="v">${fmt(d.kills)}</div></div>
      <div class="kb"><div class="l">Infections</div><div class="v">${fmt(d.infects)}</div></div>
      <div class="kb"><div class="l">Division</div><div class="v">${fmt(d.division)}</div></div>
    </div>
    <div class="shead" style="margin:18px 0 12px;padding:0 0"><div class="k">ACHIEVEMENTS</div><h2 style="font-size:21px">Medals <span style="font-size:13px;color:var(--dim)">— fill up as you progress</span></h2></div>
    <div class="medals">${medals}</div>
  </div>`;
}

/* ---- cabinet ---- */
async function renderCabinet(){
  const box=document.getElementById('cabinet');
  if(!window.BalkanAuth || !BalkanAuth.isIn()){
    box.innerHTML=`<div class="cab"><div class="msg" style="padding:40px"><i class="fa-solid fa-user-lock"></i>
      Sign in to see your cabinet, profile & stats.<br><br>
      <button class="btn btn-gold" onclick="BalkanAuth.open('up')"><i class="fa-solid fa-user-plus"></i> Create account</button>
      <button class="btn btn-ghost" onclick="BalkanAuth.open('in')">Sign in</button></div></div>`; return;
  }
  box.innerHTML=`<div class="cab"><div class="msg" style="padding:40px"><i class="fa-solid fa-spinner fa-spin"></i> Loading your cabinet…<br><small>(first load can take ~30s while the server wakes up)</small></div></div>`;
  const r=await BalkanAuth.api('/api/me');
  if(r.status===401){ BalkanAuth.logout(); renderCabinet(); return; }
  if(!r.ok){ box.innerHTML=`<div class="cab"><div class="msg" style="padding:40px"><i class="fa-solid fa-triangle-exclamation"></i> Could not load your cabinet. Try again.</div></div>`; return; }
  const p=r.data.profile, s=r.data.stats;
  const photo=p.photo?`<img src="${p.photo}" alt="me">`:`<div class="ph"><i class="fa-solid fa-user-astronaut"></i></div>`;
  const cover=p.cover?`style="background-image:url('${p.cover}')"`:'';
  box.innerHTML=`<div class="cab">
    <div class="cover" ${cover}><button class="cv-edit" onclick="document.getElementById('coverInput').click()"><i class="fa-solid fa-image"></i> Cover</button></div>
    <div class="cab-top">
      <div class="avatar">${photo}<div class="cam" title="Change photo" onclick="document.getElementById('photoInput').click()"><i class="fa-solid fa-camera"></i></div></div>
      <div class="cab-id"><h2>${esc(p.nick||p.name||'Player')}</h2>
        <div class="meta">${p.name?`<span><b>Name:</b> ${esc(p.name)}</span>`:''}${p.age?`<span><b>Age:</b> ${esc(p.age)}</span>`:''}<span><b>Email:</b> ${esc(p.email)}</span>${p.steamid?`<span><b>SteamID:</b> ${esc(p.steamid)}</span>`:''}</div></div>
      <div class="cab-act"><button class="btn btn-gold" onclick="toggleEdit()"><i class="fa-solid fa-pen"></i> Edit</button><button class="btn btn-ghost" onclick="BalkanAuth.logout()">Logout</button></div>
    </div>
    <div class="edit" id="editPane">
      <div class="frow"><div class="field"><label>Name</label><input id="ed_name" value="${esc(p.name)}"></div><div class="field"><label>Age</label><input id="ed_age" type="number" value="${esc(p.age)}"></div></div>
      <div class="frow"><div class="field"><label>In-game nick</label><input id="ed_nick" value="${esc(p.nick)}"></div><div class="field"><label>SteamID (links your game stats)</label><input id="ed_sid" value="${esc(p.steamid)}" placeholder="STEAM_0:1:1234567"></div></div>
      <button class="btn btn-gold" onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> Save</button><div class="emsg" id="ed_msg"></div>
    </div>
    ${ s ? gameProfile(s,true) : `<div class="gp"><div class="msg" style="padding:24px"><i class="fa-solid fa-link"></i> Add your <b>SteamID</b> (Edit) to show your in-game level, money, knife, zombie class & medals here.</div></div>` }
  </div>`;
}
function toggleEdit(){ document.getElementById('editPane').classList.toggle('open'); }
async function saveProfile(){
  const m=document.getElementById('ed_msg'); m.textContent='Saving…'; m.className='emsg';
  const sid=document.getElementById('ed_sid').value.trim();
  if(sid && !validSteam(sid)){ m.textContent='Invalid SteamID (or leave empty).'; m.className='emsg bad'; return; }
  const r=await BalkanAuth.api('/api/profile',{method:'PUT',body:{name:document.getElementById('ed_name').value.trim(),age:document.getElementById('ed_age').value.trim(),nick:document.getElementById('ed_nick').value.trim(),steamid:sid}});
  if(r.ok){ m.textContent='Saved!'; m.className='emsg ok'; renderCabinet(); } else { m.textContent=(r.data&&r.data.error)||'Could not save.'; m.className='emsg bad'; }
}

/* ---- photo / cover upload (resized client-side) ---- */
function onPick(input,kind,max){
  const f=input.files&&input.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{ let w=img.width,h=img.height;
    if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    saveImg(kind,c.toDataURL('image/jpeg',0.85)); URL.revokeObjectURL(img.src); };
  img.onerror=()=>alert('Could not read that image.'); img.src=URL.createObjectURL(f); input.value='';
}
async function saveImg(kind,dataUrl){ const r=await BalkanAuth.api('/api/profile',{method:'PUT',body:{[kind]:dataUrl}}); if(r.ok) renderCabinet(); else alert((r.data&&r.data.error)||'Could not save.'); }

/* ---- search / leaderboard ---- */
async function doSearch(){
  const sid=document.getElementById('searchSid').value.trim(), box=document.getElementById('searchPanel');
  if(!validSteam(sid)){ box.innerHTML='<div class="cab"><div class="msg"><i class="fa-solid fa-ghost"></i>Enter a valid SteamID.</div></div>'; return; }
  box.innerHTML='<div class="cab"><div class="msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div></div>';
  const r=await BalkanAuth.api('/api/stats?steamid='+encodeURIComponent(sid));
  if(!r.ok){ box.innerHTML='<div class="cab"><div class="msg"><i class="fa-solid fa-ghost"></i>'+((r.data&&r.data.error==='player not found')?'No player with that SteamID.':'Error.')+'</div></div>'; return; }
  box.innerHTML='<div class="cab">'+gameProfile(r.data,false)+'</div>';
}
function viewSid(sid){ const i=document.getElementById('searchSid'); i.value=sid; doSearch(); window.scrollTo({top:i.offsetTop-80,behavior:'smooth'}); }
async function loadLeaderboard(){
  const r=await BalkanAuth.api('/api/top?limit=25'), box=document.getElementById('leaderboard');
  if(!r.ok||!Array.isArray(r.data)||!r.data.length){ box.innerHTML='<div class="msg"><i class="fa-solid fa-trophy"></i>No players yet — be the first!</div>'; return; }
  box.innerHTML=`<table class="lb"><thead><tr><th>#</th><th>Player</th><th>Level</th><th>Kills</th><th>Infects</th><th>Money</th><th>Knife</th></tr></thead>
    <tbody>${r.data.map(p=>`<tr><td class="pos">${p.pos}</td><td class="nick" onclick="viewSid('${p.sid}')">${esc(p.nick)}</td><td>${fmt(p.level)}</td><td>${fmt(p.kills)}</td><td>${fmt(p.infects)}</td><td>${fmt(p.money)}$</td><td><span class="tag">${esc(p.knife)}</span></td></tr>`).join('')}</tbody></table>`;
}
window.addEventListener('load',()=>{ renderCabinet(); loadLeaderboard(); });
</script>
</body>
</html>

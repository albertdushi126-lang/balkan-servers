<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Players & Account · BALKAN-SERVERS</title>
<meta name="description" content="BALKAN-SERVERS — your account, profile & player statistics." />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="assets/auth.js"></script>

<script>
const CONFIG = {
  apiBase : "https://balkan-backend.onrender.com",
  medals : [
    { i:0, name:"Gun Expert",        desc:"Kill 5000 zombies with any weapon", target:5000, icon:"fa-gun" },
    { i:1, name:"Headshot Expert",   desc:"1000 headshot zombie kills",         target:1000, icon:"fa-crosshairs" },
    { i:2, name:"Knife Expert",      desc:"Knife 1000 zombies",                 target:1000, icon:"fa-khanda" },
    { i:3, name:"Explosives Expert", desc:"1000 grenade / explosion kills",     target:1000, icon:"fa-bomb" },
    { i:4, name:"Survivor Hunter",   desc:"Kill 1000 survivors",                target:1000, icon:"fa-skull" },
    { i:5, name:"Nemesis Hunter",    desc:"Kill 1000 nemesis",                  target:1000, icon:"fa-dragon" },
    { i:6, name:"Mayhem Veteran",    desc:"Win 100 pile-on rounds",             target:100,  icon:"fa-people-group" },
    { i:7, name:"Plague Veteran",    desc:"Win 100 plague rounds",              target:100,  icon:"fa-virus" },
    { i:8, name:"Alien Slayer",      desc:"Kill the Alien boss 10 times",       target:10,   icon:"fa-jedi" }
  ]
};
</script>

<style>
:root{
  --bg:#070809;--bg2:#0c0e12;--panel:#12151b;--panel2:#191d25;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.15);
  --txt:#eef0f3;--dim:#9aa0ac;
  --red:#e3342f;--red-d:#b3231f;--gold:#e8b54a;--green:#2fbf71;--blue:#3b82f6;--purple:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;line-height:1.6}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.gold{color:var(--gold)}.accent{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:'Oswald';text-transform:uppercase;letter-spacing:1px;font-size:14px;padding:11px 20px;border-radius:8px;border:1px solid var(--line2);cursor:pointer;transition:.18s;background:var(--panel2);color:var(--txt)}
.btn:hover{transform:translateY(-2px)}
.btn-red{background:var(--red);color:#fff;border:0}.btn-gold{background:var(--gold);color:#241a02;border:0}.btn-green{background:var(--green);color:#06200f;border:0}.btn-ghost{background:transparent}

header{position:sticky;top:0;z-index:100;background:rgba(7,8,9,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
nav{display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Oswald';font-weight:700;font-size:21px;letter-spacing:1px}.logo i{color:var(--red);font-size:24px}
.nav-links{display:flex;align-items:center;gap:22px}
.nav-links a{color:var(--dim);font-size:14px;font-weight:500}.nav-links a:hover{color:var(--txt)}
.nav-cta{display:flex;gap:8px;align-items:center}

.phead{padding:38px 0 6px}
.phead .k{color:var(--red);font-family:'Oswald';letter-spacing:3px;font-size:13px}
.phead h1{font-size:clamp(30px,5vw,52px);margin-top:4px}
.phead p{color:var(--dim);margin-top:6px}
section{padding:22px 0}
.shead{margin-bottom:16px}.shead .k{color:var(--gold);font-family:'Oswald';letter-spacing:2px;font-size:12px}.shead h2{font-size:clamp(22px,3.5vw,30px)}

/* cabinet / profile */
.cab{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:22px}
.cab-top{display:flex;gap:20px;align-items:center;padding:24px;background:linear-gradient(120deg,rgba(232,181,74,.12),rgba(227,52,47,.06));border-bottom:1px solid var(--line);flex-wrap:wrap}
.avatar{position:relative;width:96px;height:96px;flex:0 0 96px}
.avatar img{width:96px;height:96px;border-radius:18px;object-fit:cover;border:2px solid var(--line2)}
.avatar .ph{width:96px;height:96px;border-radius:18px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:38px;color:var(--gold)}
.avatar .cam{position:absolute;bottom:-6px;right:-6px;width:32px;height:32px;border-radius:50%;background:var(--gold);color:#241a02;border:3px solid var(--panel);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.cab-id h2{font-size:26px}
.cab-id .meta{color:var(--dim);font-size:14px;margin-top:2px;display:flex;flex-wrap:wrap;gap:6px 16px}
.cab-id .meta b{color:var(--txt);font-weight:600}
.cab-act{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

.edit{padding:22px 24px;border-bottom:1px solid var(--line);display:none}
.edit.open{display:block}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:12px}.field label{display:block;font-size:12.5px;color:var(--dim);margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);font-size:14px;outline:none}
.field input:focus{border-color:var(--gold)}
.emsg{font-size:13px;margin-top:6px;min-height:18px}.emsg.ok{color:var(--green)}.emsg.bad{color:var(--red)}

.link-sid{padding:20px 24px;text-align:center;color:var(--dim)}
.link-sid i{font-size:30px;color:var(--line2);display:block;margin-bottom:8px}

/* stats panel (shared with search) */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:22px}
.p-head{display:flex;align-items:center;gap:16px;padding:22px;background:linear-gradient(120deg,rgba(227,52,47,.12),rgba(232,181,74,.05));border-bottom:1px solid var(--line);flex-wrap:wrap}
.p-ava{width:64px;height:64px;border-radius:13px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold);flex:0 0 64px}
.p-id h2{font-size:24px}.p-id .sid{color:var(--dim);font-size:12px;font-family:'Oswald';letter-spacing:1px}
.p-rank{margin-left:auto;text-align:center}.p-rank .n{font-family:'Oswald';font-size:28px;color:var(--gold);line-height:1}.p-rank .l{font-size:11px;color:var(--dim);font-family:'Oswald';letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--line)}
.cell{background:var(--panel);padding:15px 17px}
.cell .l{font-size:11px;color:var(--dim);font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.cell .v{font-family:'Oswald';font-size:23px;margin-top:3px}.cell .v small{font-size:13px;color:var(--dim)}.cell.hl .v{color:var(--gold)}
.medals{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px;margin-top:14px}
.medal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.medal.done{border-color:rgba(232,181,74,.5);background:linear-gradient(160deg,rgba(232,181,74,.1),transparent)}
.medal .mi{width:38px;height:38px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dim);flex:0 0 38px}
.medal.done .mi{color:var(--gold)}
.medal h4{font-size:14px;display:flex;align-items:center;gap:7px}.medal h4 .chk{color:var(--green);font-size:12px}
.medal p{color:var(--dim);font-size:12px}.mprog{height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;margin-top:7px}.mprog i{display:block;height:100%;background:var(--gold)}
.medal .num{font-size:11px;color:var(--dim);margin-top:4px;font-family:'Oswald'}

.search{display:flex;gap:10px;margin:8px 0 4px;flex-wrap:wrap}
.search input{flex:1;min-width:230px;padding:12px 14px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);font-size:15px;outline:none}
.search input:focus{border-color:var(--gold)}
.hint{color:var(--dim);font-size:13px}
.lb{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.lb th,.lb td{padding:12px 15px;text-align:left;border-bottom:1px solid var(--line);font-size:14px}
.lb th{font-family:'Oswald';letter-spacing:1px;font-size:12px;color:var(--dim);text-transform:uppercase}
.lb tr:last-child td{border-bottom:0}.lb td.pos{font-family:'Oswald';color:var(--gold);font-size:18px}
.lb td.nick{font-weight:600;cursor:pointer}.lb td.nick:hover{color:var(--gold)}.lb .tag{font-size:11px;background:var(--panel2);border-radius:20px;padding:2px 9px;color:var(--dim);font-family:'Oswald'}
.msg{padding:26px;text-align:center;color:var(--dim)}.msg i{font-size:30px;color:var(--line2);display:block;margin-bottom:8px}
footer{border-top:1px solid var(--line);padding:30px 0;margin-top:24px}.foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;color:var(--dim);font-size:13px}
@media(max-width:680px){.nav-links{display:none}.frow{grid-template-columns:1fr}.cab-act{margin-left:0;width:100%}}
</style>
</head>
<body>

<header><div class="wrap"><nav>
  <a class="logo" href="index.html"><i class="fa-solid fa-skull"></i> BALKAN<span class="accent">SERVERS</span></a>
  <div class="nav-links"><a href="index.html">Home</a><a href="players.html" class="gold">Stats</a><a href="classes.html">Classes</a><a href="store.html">Store</a></div>
  <div class="nav-cta"><span id="balkanAuthUI" style="display:flex;gap:8px;align-items:center"></span>
    <button class="btn btn-green" onclick="window.location.href='steam://connect/31.57.151.143:27015'"><i class="fa-solid fa-play"></i> Connect</button></div>
</nav></div></header>

<div class="wrap">
  <div class="phead"><div class="k">ACCOUNT</div><h1>My <span class="gold">Cabinet</span></h1>
    <p>Your profile, photo and live game stats — or search any player below.</p></div>
</div>

<div class="wrap">
  <section id="cabSection"><div id="cabinet"></div></section>

  <section>
    <div class="shead"><div class="k">SEARCH</div><h2>Find a player</h2></div>
    <div class="search"><input id="searchSid" placeholder="STEAM_0:1:1234567" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-red" onclick="doSearch()"><i class="fa-solid fa-magnifying-glass"></i> Search</button></div>
    <div class="hint">In-game console type <b>status</b>, or use <a href="https://steamid.io" target="_blank" rel="noopener" style="color:var(--blue)">steamid.io</a>.</div>
    <div id="searchPanel" style="margin-top:14px"></div>
  </section>

  <section>
    <div class="shead"><div class="k">TOP PLAYERS</div><h2>Leaderboard</h2></div>
    <div id="leaderboard"><div class="msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div></div>
  </section>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="onPhotoPick(this)">

<footer><div class="wrap"><div class="foot">
  <span>© 2026 BALKAN-SERVERS · Zombie CSO</span><span><a href="index.html" class="gold">← Back to community</a></span>
</div></div></footer>

<script>
const fmt = (n) => (n==null ? '—' : Number(n).toLocaleString('en-US'));
const validSteam = (s) => /^STEAM_[0-5]:[01]:\d+$/i.test((s||'').trim());
const esc = (s) => String(s==null?'':s).replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

/* react to login/logout from auth.js */
document.addEventListener('balkan-auth', renderCabinet);
window.onBalkanAuth = renderCabinet;

/* ---------- cabinet ---------- */
let CURRENT=null;
async function renderCabinet(){
  const box = document.getElementById('cabinet');
  if(!window.BalkanAuth || !BalkanAuth.isIn()){
    box.innerHTML = `<div class="cab"><div class="msg"><i class="fa-solid fa-user-lock"></i>
      Sign in to see your cabinet, profile & stats.<br><br>
      <button class="btn btn-gold" onclick="BalkanAuth.open('up')"><i class="fa-solid fa-user-plus"></i> Create account</button>
      <button class="btn btn-ghost" onclick="BalkanAuth.open('in')">Sign in</button></div></div>`;
    return;
  }
  box.innerHTML = `<div class="cab"><div class="msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading your cabinet… <small>(first load can take ~30s while the server wakes up)</small></div></div>`;
  const r = await BalkanAuth.api('/api/me');
  if(r.status===401){ BalkanAuth.logout(); renderCabinet(); return; }
  if(!r.ok){ box.innerHTML = `<div class="cab"><div class="msg"><i class="fa-solid fa-triangle-exclamation"></i> Could not load your cabinet. Try again.</div></div>`; return; }
  CURRENT = r.data;
  const p = r.data.profile, s = r.data.stats;
  const photo = p.photo ? `<img src="${p.photo}" alt="me">` : `<div class="ph"><i class="fa-solid fa-user-astronaut"></i></div>`;
  box.innerHTML = `
    <div class="cab">
      <div class="cab-top">
        <div class="avatar">${photo}<div class="cam" title="Change photo" onclick="document.getElementById('photoInput').click()"><i class="fa-solid fa-camera"></i></div></div>
        <div class="cab-id">
          <h2>${esc(p.nick||p.name||'Player')}</h2>
          <div class="meta">
            ${p.name?`<span><b>Name:</b> ${esc(p.name)}</span>`:''}
            ${p.age?`<span><b>Age:</b> ${esc(p.age)}</span>`:''}
            <span><b>Email:</b> ${esc(p.email)}</span>
            ${p.steamid?`<span><b>SteamID:</b> ${esc(p.steamid)}</span>`:''}
          </div>
        </div>
        <div class="cab-act">
          <button class="btn btn-gold" onclick="toggleEdit()"><i class="fa-solid fa-pen"></i> Edit profile</button>
          <button class="btn btn-ghost" onclick="BalkanAuth.logout()">Logout</button>
        </div>
      </div>
      <div class="edit" id="editPane">
        <div class="frow">
          <div class="field"><label>Name</label><input id="ed_name" value="${esc(p.name)}"></div>
          <div class="field"><label>Age</label><input id="ed_age" type="number" value="${esc(p.age)}"></div>
        </div>
        <div class="frow">
          <div class="field"><label>In-game nick</label><input id="ed_nick" value="${esc(p.nick)}"></div>
          <div class="field"><label>SteamID (links your game stats)</label><input id="ed_sid" value="${esc(p.steamid)}" placeholder="STEAM_0:1:1234567"></div>
        </div>
        <button class="btn btn-gold" onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
        <div class="emsg" id="ed_msg"></div>
      </div>
      ${ s ? '' : `<div class="link-sid"><i class="fa-solid fa-link"></i> Add your <b>SteamID</b> (Edit profile) to show your in-game level, money, knife, zombie class & medals here.</div>` }
    </div>
    ${ s ? renderStatsPanel(s, true) : '' }`;
}
function toggleEdit(){ document.getElementById('editPane').classList.toggle('open'); }
async function saveProfile(){
  const m = document.getElementById('ed_msg'); m.textContent='Saving…'; m.className='emsg';
  const sid = document.getElementById('ed_sid').value.trim();
  if(sid && !validSteam(sid)){ m.textContent='Invalid SteamID (or leave it empty).'; m.className='emsg bad'; return; }
  const body = { name:document.getElementById('ed_name').value.trim(), age:document.getElementById('ed_age').value.trim(), nick:document.getElementById('ed_nick').value.trim(), steamid:sid };
  const r = await BalkanAuth.api('/api/profile', {method:'PUT', body});
  if(r.ok){ m.textContent='Saved!'; m.className='emsg ok'; renderCabinet(); }
  else { m.textContent=(r.data&&r.data.error)||'Could not save.'; m.className='emsg bad'; }
}

/* ---------- photo upload (resized client-side) ---------- */
function onPhotoPick(input){
  const f = input.files && input.files[0]; if(!f) return;
  const img = new Image();
  img.onload = () => {
    const max=256; let w=img.width,h=img.height;
    if(w>h){ if(w>max){ h=Math.round(h*max/w); w=max; } } else { if(h>max){ w=Math.round(w*max/h); h=max; } }
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    savePhoto(c.toDataURL('image/jpeg',0.85)); URL.revokeObjectURL(img.src);
  };
  img.onerror = () => alert('Could not read that image.');
  img.src = URL.createObjectURL(f);
  input.value='';
}
async function savePhoto(dataUrl){
  const r = await BalkanAuth.api('/api/profile', {method:'PUT', body:{photo:dataUrl}});
  if(r.ok) renderCabinet(); else alert((r.data&&r.data.error)||'Could not save photo.');
}

/* ---------- stats panel (cabinet + search) ---------- */
function renderStatsPanel(d, isMe){
  const medals = CONFIG.medals.map(m=>{
    const val=(d.extra&&d.extra[m.i])||0, done=val>=m.target, pct=Math.min(100,Math.round(val/m.target*100));
    return `<div class="medal ${done?'done':''}"><div class="mi"><i class="fa-solid ${m.icon}"></i></div>
      <div style="flex:1"><h4>${m.name} ${done?'<span class="chk"><i class="fa-solid fa-check"></i></span>':''}</h4><p>${m.desc}</p>
      ${done?'':`<div class="mprog"><i style="width:${pct}%"></i></div><div class="num">${fmt(val)} / ${fmt(m.target)}</div>`}</div></div>`;
  }).join('');
  return `<div class="panel">
    <div class="p-head"><div class="p-ava"><i class="fa-solid fa-user-astronaut"></i></div>
      <div class="p-id"><h2>${esc(d.nick)} ${isMe?'<span style="font-size:12px;color:var(--gold)">· you</span>':''}</h2><div class="sid">${esc(d.sid)}</div></div>
      <div class="p-rank"><div class="n">#${d.rank||'—'}</div><div class="l">of ${fmt(d.totalPlayers)}</div></div></div>
    <div class="grid">
      <div class="cell hl"><div class="l"><i class="fa-solid fa-arrow-up-9-1"></i> Level</div><div class="v">${fmt(d.level)}</div></div>
      <div class="cell hl"><div class="l"><i class="fa-solid fa-coins"></i> Money</div><div class="v">${fmt(d.money)}<small>$</small></div></div>
      <div class="cell"><div class="l"><i class="fa-solid fa-crosshairs"></i> Kills</div><div class="v">${fmt(d.kills)}</div></div>
      <div class="cell"><div class="l"><i class="fa-solid fa-syringe"></i> Infections</div><div class="v">${fmt(d.infects)}</div></div>
      <div class="cell"><div class="l"><i class="fa-solid fa-hammer"></i> Knife</div><div class="v" style="font-size:17px">${esc(d.knife)}</div></div>
      <div class="cell"><div class="l"><i class="fa-solid fa-skull"></i> Zombie class</div><div class="v" style="font-size:17px">${esc(d.zclass)}</div></div>
    </div></div>
    <div class="shead" style="margin:6px 0 12px"><div class="k">ACHIEVEMENTS</div><h2 style="font-size:21px">Medals</h2></div>
    <div class="medals">${medals}</div>`;
}

/* ---------- search ---------- */
async function doSearch(){
  const sid = document.getElementById('searchSid').value.trim();
  const box = document.getElementById('searchPanel');
  if(!validSteam(sid)){ box.innerHTML='<div class="panel"><div class="msg"><i class="fa-solid fa-ghost"></i>Enter a valid SteamID.</div></div>'; return; }
  box.innerHTML='<div class="panel"><div class="msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div></div>';
  const r = await BalkanAuth.api('/api/stats?steamid='+encodeURIComponent(sid));
  if(!r.ok){ box.innerHTML='<div class="panel"><div class="msg"><i class="fa-solid fa-ghost"></i>'+((r.data&&r.data.error==='player not found')?'No player with that SteamID.':'Error.')+'</div></div>'; return; }
  box.innerHTML = renderStatsPanel(r.data, false);
}
function viewSid(sid){ document.getElementById('searchSid').value=sid; doSearch(); window.scrollTo({top:document.getElementById('searchSid').offsetTop-80,behavior:'smooth'}); }

async function loadLeaderboard(){
  const r = await BalkanAuth.api('/api/top?limit=25');
  const box=document.getElementById('leaderboard');
  if(!r.ok || !Array.isArray(r.data) || !r.data.length){ box.innerHTML='<div class="msg"><i class="fa-solid fa-trophy"></i>No players yet — be the first!</div>'; return; }
  box.innerHTML=`<table class="lb"><thead><tr><th>#</th><th>Player</th><th>Level</th><th>Kills</th><th>Infects</th><th>Money</th><th>Knife</th></tr></thead>
    <tbody>${r.data.map(p=>`<tr><td class="pos">${p.pos}</td><td class="nick" onclick="viewSid('${p.sid}')">${esc(p.nick)}</td>
      <td>${fmt(p.level)}</td><td>${fmt(p.kills)}</td><td>${fmt(p.infects)}</td><td>${fmt(p.money)}$</td><td><span class="tag">${esc(p.knife)}</span></td></tr>`).join('')}</tbody></table>`;
}

/* init */
window.addEventListener('load', () => { renderCabinet(); loadLeaderboard(); });
</script>
</body>
</html>

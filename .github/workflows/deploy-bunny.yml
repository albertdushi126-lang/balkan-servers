name: Deploy to Bunny.net

# Deploys the static site to a Bunny.net Storage Zone and purges the CDN cache.
# Runs on GitHub's servers (which can reach bunny.net) on every push to main.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   BUNNY_STORAGE_ZONE      name of the Storage Zone
#   BUNNY_STORAGE_PASSWORD  Storage zone password (Storage -> FTP & API Access)
#   BUNNY_API_KEY           Account API key (Account Settings -> API)
#   BUNNY_PULLZONE_ID       numeric Pull Zone id (from dash.bunny.net/cdn/<ID>)
# Optional:
#   BUNNY_STORAGE_ENDPOINT  region host, e.g. uk.storage.bunnycdn.com
#                           (defaults to storage.bunnycdn.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-bunny
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site to Bunny Storage
        env:
          STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          STORAGE_ENDPOINT: ${{ secrets.BUNNY_STORAGE_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ -z "${STORAGE_ZONE}" ] || [ -z "${STORAGE_PASSWORD}" ]; then
            echo "::error::Missing BUNNY_STORAGE_ZONE or BUNNY_STORAGE_PASSWORD secret."
            exit 1
          fi
          ENDPOINT="${STORAGE_ENDPOINT:-storage.bunnycdn.com}"
          echo "Deploying to https://${ENDPOINT}/${STORAGE_ZONE}/"
          # Upload every tracked site file, preserving folder structure.
          git ls-files \
            | grep -v -E '^(\.github/|\.gitignore$)' \
            | while IFS= read -r f; do
                echo "  up  ${f}"
                curl -fsS --retry 3 --retry-delay 2 -X PUT \
                  -H "AccessKey: ${STORAGE_PASSWORD}" \
                  -H "Content-Type: application/octet-stream" \
                  --data-binary @"${f}" \
                  "https://${ENDPOINT}/${STORAGE_ZONE}/${f}"
              done
          echo "Upload complete."

      - name: Purge CDN cache
        env:
          API_KEY: ${{ secrets.BUNNY_API_KEY }}
          PULLZONE_ID: ${{ secrets.BUNNY_PULLZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${API_KEY}" ] || [ -z "${PULLZONE_ID}" ]; then
            echo "::warning::BUNNY_API_KEY / BUNNY_PULLZONE_ID not set - skipping cache purge."
            exit 0
          fi
          curl -fsS --retry 3 --retry-delay 2 -X POST \
            -H "AccessKey: ${API_KEY}" \
            -H "Content-Length: 0" \
            "https://api.bunny.net/pullzone/${PULLZONE_ID}/purgeCache"
          echo "CDN cache purged."
